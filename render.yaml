services:
  - type: web
    name: lufilya-school-management
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/state
    envVars:
      - key: USE_SUPABASE
        value: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
